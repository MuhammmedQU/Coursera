<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - AbituriyentAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .admin-badge {
            background-color: #c41e3a;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 0.25rem;
            font-size: 0.875rem;
            font-weight: bold;
            margin-left: 0.5rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">AbituriyentAI <span class="admin-badge">ADMIN</span></h1>
            <div class="nav-links">
                <a href="/">Home</a>
            </div>
        </div>
    </nav>

    <div class="login-container">
        <div class="login-box">
            <h2>Admin Login</h2>
            
            {% if error %}
                <div class="error-message">
                    ❌ {{ error }}
                </div>
            {% endif %}

            <form method="POST" class="login-form">
                <div class="form-group">
                    <label for="email">Admin Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        required 
                        placeholder="Enter your admin email"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required 
                        placeholder="Enter your password"
                    >
                </div>

                <button type="submit" class="btn">Login as Admin</button>
            </form>

            <div class="form-footer">
                <p>Not an admin? <a href="/">Return to Home</a></p>
            </div>
        </div>
    </div>
</body>
</html>
